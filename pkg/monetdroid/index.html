<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monet Droid</title>
<link id="favicon" rel="icon" href="data:,">
<link rel="stylesheet" href="/assets/styles.css">
<script src="/assets/htmx-2.0.4.min.js"></script>
<script src="/assets/htmx-ext-sse-2.2.3.js"></script>
</head>
<body>

<div class="app" hx-ext="sse" sse-connect="/events">
  <span id="page-title" style="display:none"></span>
  <!--
    SSE swap target: receives all server-sent events and processes OOB swaps.
    hx-swap="none" means the element itself isn't updated — only OOB elements
    in the response are swapped into their targets.

    Auto-scroll: debounced via _sp flag so at most 1 reflow per frame.
    Only scrolls if _ab (at-bottom) is true, tracked by scroll event on #messages.
    _ab starts true so initial load scrolls to bottom.
  -->
  <div sse-swap="htmx" hx-swap="none" style="display:none"
       hx-on:htmx:sse-message="if(window._ab!==false&&!window._sp){window._sp=true;requestAnimationFrame(function(){window._sp=false;var m=document.getElementById('messages');m.scrollTop=m.scrollHeight})}"></div>

  <div class="header">
    <button class="header-btn" popovertarget="drawer" hx-get="/drawer" hx-target="#drawer-content" hx-swap="innerHTML">☰</button>
    <a href="/" class="header-btn" style="text-decoration:none">⌂</a>
    <div class="session-label" id="session-label" hx-get="/label-edit" hx-target="#session-label" hx-swap="outerHTML" hx-include="#session-id"></div>
    <button class="header-btn" id="cwd-copy" style="display:none" hx-on:click="this.closest('.header').classList.toggle('show-cwd')">📁</button>
    <span id="running-dot" style="display:none"></span>
    <form id="close-btn" hx-post="/close" hx-swap="none" hx-include="#session-id" style="display:none"><button class="header-btn" type="submit" title="Close session">✕</button></form>
    <button class="header-btn" popovertarget="new-session-popover">+</button>
    <div class="cwd-row" id="cwd-row"></div>
  </div>

  <div id="session-view" class="session-view">
    <div class="mode-bar" id="mode-bar"></div>
    <div class="cost-bar" id="cost-bar"></div>

    <details class="todos-panel" id="todos-panel">
      <summary class="todos-summary" id="todos-summary"></summary>
      <div class="todos-body" id="todos-body"></div>
    </details>

    <div class="messages-wrap">
      <div class="messages" id="messages"
           hx-on:scroll="if(this.scrollTop===0){window._ab=true}else{var ab=this.scrollHeight-this.scrollTop-this.clientHeight<200;window._ab=ab;document.getElementById('scroll-btn').style.display=ab?'none':'flex'}"
           hx-on:htmx:before-swap="if(event.detail.target.id==='load-older'){this._sh=this.scrollHeight}"
           hx-on:htmx:after-swap="if(this._sh){this.scrollTop+=this.scrollHeight-this._sh;delete this._sh}">
        <div id="msg-content"></div>
        <div id="thinking"></div>
        <div id="streaming"></div>
      </div>
      <button id="scroll-btn" class="scroll-btn" onclick="var m=document.getElementById('messages');m.scrollTop=m.scrollHeight;this.style.display='none';window._ab=true">↓</button>
    </div>

    <div class="review-bar" id="review-bar"></div>
    <div class="queue-bar" id="queue-bar"></div>
    <div class="input-area" id="input-area">
      <form hx-post="/send" hx-swap="none" hx-encoding="multipart/form-data" hx-on::after-request="this.reset(); this.querySelector('.badge').classList.add('hidden'); this.querySelector('.badge').textContent = ''">
        <input type="hidden" name="session_id" id="session-id" value="">
        <input type="hidden" name="cwd" id="session-cwd" value="">
        <input type="hidden" name="label" id="session-label-value" value="">
        <div class="input-row">
          <textarea name="text" placeholder="Message Claude Code..." rows="1" onkeydown="if(event.key==='Enter'&&(event.ctrlKey||event.metaKey)){event.preventDefault();this.form.requestSubmit()}"></textarea>
          <label class="img-btn" title="Attach image">
            <span class="badge hidden"></span>
            📎
            <input type="file" name="images" accept="image/jpeg,image/png,image/gif,image/webp" multiple hidden onchange="this.previousElementSibling.textContent = this.files.length || ''; this.previousElementSibling.classList.toggle('hidden', !this.files.length)">
          </label>
          <button type="submit" class="send-btn">↑</button>
          <span id="stop-btn"></span>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Drawer popover -->
<div popover id="drawer">
  <div id="drawer-content" style="padding:8px;text-align:center;color:var(--text2);font-size:13px">Loading...</div>
</div>

<!-- New session popover -->
<div popover id="new-session-popover">
  <h3>New Workstream</h3>
  <form hx-post="/new-workstream" hx-swap="none"
        hx-on::after-request="document.getElementById('new-session-popover').hidePopover()">
    <label>Name</label>
    <input type="text" name="name" placeholder="auth-refactor" required>
    <label>Project directory</label>
    <input type="text" name="cwd" placeholder="~/projects/my-app">
    <div class="modal-actions">
      <button type="button" class="btn-cancel" popovertarget="new-session-popover" popovertargetaction="hide">Cancel</button>
      <button type="submit" class="btn-create">Create</button>
    </div>
  </form>
  <hr style="border:none;border-top:1px solid var(--border);margin:16px 0">
  <details>
    <summary style="font-size:13px;color:var(--text2);cursor:pointer">Plain session (no branch)</summary>
    <form hx-post="/new" hx-swap="none" style="margin-top:12px"
          hx-on::after-request="document.getElementById('new-session-popover').hidePopover()">
      <label>Label</label>
      <input type="text" name="label" placeholder="fix auth flaky test">
      <label>Project directory</label>
      <input type="text" name="cwd" placeholder="~/projects/my-app">
      <div class="modal-actions">
        <button type="button" class="btn-cancel" popovertarget="new-session-popover" popovertargetaction="hide">Cancel</button>
        <button type="submit" class="btn-create">Create</button>
      </div>
    </form>
  </details>
</div>
</body>
</html>
