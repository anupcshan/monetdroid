<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Monet Droid</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<script src="https://unpkg.com/htmx-ext-sse@2.2.3/sse.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0c0c0e;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a32;
    --text: #e2e0d8;
    --text2: #8b8a85;
    --accent: #d4a053;
    --accent2: #c48a3a;
    --tool: #5b8a72;
    --tool-bg: #1a2e24;
    --error: #c45c5c;
    --error-bg: #2e1a1a;
    --blue: #5b7a9e;
    --blue-bg: #1a2230;
    --radius: 12px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    margin: 0;
  }

  /* --- Header --- */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    gap: 12px;
  }
  .session-label {
    font-size: 12px;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    text-align: center;
    cursor: pointer;
  }
  .session-label-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 4px 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    text-align: center;
    outline: none;
  }
  .header-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    flex-shrink: 0;
  }

  /* --- Drawer (popover) --- */
  [popover] {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    max-width: min(360px, 90vw);
    max-height: 80vh;
    overflow-y: auto;
    padding: 8px;
  }
  [popover]::backdrop { background: rgba(0,0,0,0.5); }
  .drawer-section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 12px 12px 6px;
  }
  .drawer-item {
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 4px;
  }
  .drawer-item:active { background: var(--surface2); }
  .drawer-item .di-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 2px;
  }
  .drawer-item .di-path {
    font-size: 11px;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .drawer-item .di-meta {
    font-size: 11px;
    color: var(--text2);
    margin-top: 4px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .di-running {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .history-group { margin-bottom: 4px; }
  .history-group-header {
    padding: 8px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    cursor: pointer;
    list-style: none;
    border-radius: 6px;
  }
  .history-group-header { display: flex; align-items: center; }
  .history-group-header:active { background: var(--surface2); }
  .new-session-btn {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 14px;
    line-height: 1;
    width: 22px;
    height: 22px;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .new-session-btn:hover { background: var(--surface2); color: var(--accent); border-color: var(--accent); }
  .history-group-header::marker { content: ''; }
  .history-group-header::before { content: '▶ '; font-size: 10px; color: var(--text2); }
  details[open] > .history-group-header::before { content: '▼ '; }
  .history-group-items { padding-left: 12px; }
  .history-item {
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 2px;
  }
  .history-item:active { background: var(--surface2); }
  .history-item .hi-summary {
    font-size: 12px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .history-item .hi-time {
    font-size: 10px;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 2px;
  }

  /* --- Mode bar --- */
  .mode-bar {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 6px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--tool-bg);
    border-bottom: 1px solid var(--tool);
    min-height: 0;
  }
  .mode-bar:empty { display: none; }
  .mode-label { color: var(--tool); font-weight: 600; }
  .mode-reset {
    color: var(--text2);
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    cursor: pointer;
  }

  /* --- Cost bar --- */
  .cost-bar {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text2);
    padding: 4px 16px;
    text-align: right;
    min-height: 0;
  }
  .cost-bar:empty { display: none; }
  .diff-stat-link {
    text-decoration: none;
    margin-left: 12px;
  }
  .diff-add { color: #589819; }
  .diff-rm { color: var(--error); }

  /* --- Todos panel --- */
  .todos-panel {
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .todos-panel:not([open]) .todos-summary:empty ~ .todos-body { display: none; }
  .todos-summary:empty { display: none; }
  .todos-summary {
    padding: 8px 16px;
    color: var(--accent);
    font-weight: 600;
    cursor: pointer;
    list-style: none;
  }
  .todos-summary::marker { content: ''; }
  .todos-summary::before { content: '▶ '; font-size: 9px; color: var(--text2); }
  .todos-panel[open] .todos-summary::before { content: '▼ '; }
  .todos-body {
    padding: 0 16px 8px;
  }
  .todo-item {
    padding: 2px 0;
    color: var(--text2);
  }
  .todo-done { color: var(--tool); }
  .todo-done .todo-icon { color: var(--tool); }
  .todo-active { color: var(--accent); }
  .todo-active .todo-icon { color: var(--accent); }
  .todo-pending .todo-icon { color: var(--text2); }

  /* --- Messages --- */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    -webkit-overflow-scrolling: touch;
  }
  .msg {
    margin-bottom: 16px;
    max-width: 100%;
  }
  .msg-user {
    display: flex;
    justify-content: flex-end;
  }
  .msg-user .msg-bubble {
    background: var(--accent);
    color: var(--bg);
    border-radius: var(--radius) var(--radius) 4px var(--radius);
    padding: 10px 14px;
    max-width: 85%;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg-img-thumb {
    max-width: 200px;
    max-height: 200px;
    border-radius: 8px;
    display: block;
    margin-bottom: 6px;
    cursor: pointer;
  }
  .img-dialog {
    background: none;
    border: none;
    padding: 0;
    max-width: 90vw;
    max-height: 90vh;
  }
  .img-dialog::backdrop { background: rgba(0,0,0,0.85); }
  .img-dialog img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    border-radius: 8px;
  }
  .msg-assistant .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) var(--radius) 4px;
    padding: 12px 14px;
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
  }
  .msg-assistant .msg-bubble pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    margin: 8px 0;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .msg-assistant .msg-bubble code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: var(--bg);
    padding: 2px 5px;
    border-radius: 4px;
  }
  .msg-assistant .msg-bubble pre code {
    background: none;
    padding: 0;
  }
  .msg-assistant .msg-bubble p { margin: 8px 0; }
  .msg-assistant .msg-bubble p:first-child { margin-top: 0; }
  .msg-assistant .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-assistant .msg-bubble h1,
  .msg-assistant .msg-bubble h2,
  .msg-assistant .msg-bubble h3,
  .msg-assistant .msg-bubble h4,
  .msg-assistant .msg-bubble h5,
  .msg-assistant .msg-bubble h6 {
    margin: 12px 0 6px;
    font-weight: 600;
    color: var(--text);
  }
  .msg-assistant .msg-bubble h1 { font-size: 18px; }
  .msg-assistant .msg-bubble h2 { font-size: 16px; }
  .msg-assistant .msg-bubble h3 { font-size: 15px; }
  .msg-assistant .msg-bubble h4,
  .msg-assistant .msg-bubble h5,
  .msg-assistant .msg-bubble h6 { font-size: 14px; }
  .msg-assistant .msg-bubble ul,
  .msg-assistant .msg-bubble ol {
    margin: 8px 0;
    padding-left: 24px;
  }
  .msg-assistant .msg-bubble li { margin: 4px 0; }
  .msg-assistant .msg-bubble blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 12px;
    margin: 8px 0;
    color: var(--text2);
  }
  .msg-assistant .msg-bubble a {
    color: var(--accent);
    text-decoration: underline;
    text-decoration-color: var(--accent2);
  }
  .msg-assistant .msg-bubble hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 12px 0;
  }
  .msg-assistant .msg-bubble table {
    border-collapse: collapse;
    margin: 8px 0;
    font-size: 13px;
    width: 100%;
  }
  .msg-assistant .msg-bubble th,
  .msg-assistant .msg-bubble td {
    border: 1px solid var(--border);
    padding: 6px 10px;
    text-align: left;
  }
  .msg-assistant .msg-bubble th {
    background: var(--bg);
    font-weight: 600;
  }
  .msg-assistant .msg-bubble input[type="checkbox"] {
    margin-right: 6px;
  }
  .msg-tool {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 8px;
  }
  .tool-chip {
    background: var(--tool-bg);
    border: 1px solid var(--tool);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    max-width: 100%;
  }
  .tool-chip .tool-name {
    color: var(--tool);
    font-weight: 600;
    cursor: pointer;
    list-style: none;
  }
  .tool-chip .tool-name::marker { content: ''; }
  .tool-chip .tool-name::before { content: '▶ '; font-size: 9px; }
  .tool-chip[open] .tool-name::before { content: '▼ '; }
  .tool-chip .tool-detail {
    color: var(--text2);
    font-size: 11px;
    white-space: pre-wrap;
    word-break: break-word;
    margin-top: 6px;
    max-height: 400px;
    overflow: auto;
  }
  .tool-detail pre,
  .perm-detail pre {
    margin: 0;
    border-radius: 6px;
    font-size: 11px;
    line-height: 1.4;
    white-space: pre;
    overflow-x: auto;
  }
  .perm-detail:has(pre) {
    background: none;
    padding: 0;
  }
  .tool-result-chip {
    background: var(--blue-bg);
    border: 1px solid var(--blue);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text2);
  }
  .tool-result-chip .tool-result-summary {
    cursor: pointer;
    list-style: none;
    color: var(--blue);
  }
  .tool-result-chip .tool-result-summary::marker { content: ''; }
  .tool-result-chip .tool-result-summary::before { content: '▶ '; font-size: 9px; }
  .tool-result-chip[open] .tool-result-summary::before { content: '▼ '; }
  .tool-result-chip .tool-result-full {
    white-space: pre-wrap;
    word-break: break-all;
    margin-top: 6px;
    max-height: 400px;
    overflow: auto;
  }
  .msg-error {
    background: var(--error-bg);
    border: 1px solid var(--error);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--error);
    font-family: 'JetBrains Mono', monospace;
  }

  /* --- Thinking indicator --- */
  .thinking-indicator {
    display: flex;
    gap: 4px;
    padding: 8px 0;
  }
  .thinking-indicator span {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .thinking-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* --- Permission prompt --- */
  .perm-prompt {
    background: #1a1a2e;
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 16px;
  }
  .perm-prompt .perm-header {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .perm-prompt .perm-tool {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--tool);
    margin-bottom: 4px;
  }
  .perm-prompt .perm-reason {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 8px;
  }
  .perm-prompt .perm-detail {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text2);
    background: var(--bg);
    border-radius: 6px;
    padding: 8px;
    margin-bottom: 10px;
    max-height: 300px;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .perm-actions {
    display: flex;
    gap: 8px;
  }
  .perm-actions button {
    padding: 8px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    border: none;
  }
  .perm-allow { background: var(--tool); color: var(--bg); }
  .perm-deny { background: var(--error); color: white; }

  /* --- Ask User (multiple choice) --- */
  .ask-question { margin-bottom: 12px; }
  .ask-header { font-size: 11px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .ask-text { font-size: 13px; color: var(--text); margin-bottom: 8px; }
  .ask-option { display: flex; align-items: baseline; gap: 8px; padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .ask-option:hover { background: var(--surface2); }
  .ask-option input { flex-shrink: 0; accent-color: var(--tool); }
  .ask-label { color: var(--text); font-weight: 500; }
  .ask-desc { color: var(--text2); font-size: 12px; }
  .ask-other-text { display: block; width: 100%; margin-top: 4px; padding: 6px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; }
  .ask-other-text:focus { outline: none; border-color: var(--accent); }
  .ask-answered { font-size: 13px; color: var(--text2); padding: 2px 0; }

  /* --- Queue bar --- */
  .queue-bar:empty { display: none; }
  .queue-content {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }
  .queue-label {
    color: var(--accent);
    font-weight: 600;
    flex-shrink: 0;
  }
  .queue-text {
    color: var(--text2);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .queue-cancel {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 10px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .queue-cancel:active { background: var(--surface2); }

  /* --- Input --- */
  .input-area {
    padding: 12px 16px;
    padding-bottom: calc(12px + var(--safe-bottom));
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .input-row textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.4;
    resize: none;
    min-height: 42px;
    max-height: 150px;
    field-sizing: content;
    outline: none;
  }
  .input-row textarea:focus { border-color: var(--accent); }
  .input-row textarea::placeholder { color: var(--text2); }
  .send-btn {
    width: 42px;
    height: 42px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    font-size: 18px;
  }

  .img-btn {
    width: 42px;
    height: 42px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    font-size: 16px;
    position: relative;
  }
  .img-btn .badge {
    position: absolute;
    top: -4px;
    right: -4px;
    background: var(--error);
    color: white;
    font-size: 10px;
    font-weight: 700;
    min-width: 16px;
    height: 16px;
    padding: 0 4px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .img-btn .badge.hidden { display: none; }

  .stop-btn {
    width: 42px;
    height: 42px;
    background: var(--error);
    color: white;
    border: none;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    font-size: 16px;
  }

  /* --- New session (popover) --- */
  #new-session-popover {
    padding: 24px 20px;
    width: min(400px, 90vw);
  }
  #new-session-popover h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  #new-session-popover label {
    font-size: 13px;
    color: var(--text2);
    display: block;
    margin-bottom: 6px;
    font-weight: 500;
  }
  #new-session-popover input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    outline: none;
    margin-bottom: 16px;
  }
  #new-session-popover input:focus { border-color: var(--accent); }
  .modal-actions {
    display: flex;
    gap: 10px;
  }
  .modal-actions button {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    border: none;
  }
  .btn-cancel { background: var(--surface2); color: var(--text); border: 1px solid var(--border) !important; }
  .btn-create { background: var(--accent); color: var(--bg); }

  /* --- Notification queue --- */
  .queue-header {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 20px 0 12px;
  }
  .queue-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .queue-completed { border-left: 3px solid var(--tool); }
  .queue-blocked { border-left: 3px solid var(--accent); }
  .qi-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    font-size: 11px;
  }
  .queue-completed .qi-status { color: var(--tool); font-weight: 600; }
  .queue-blocked .qi-status { color: var(--accent); font-weight: 600; }
  .qi-time { color: var(--text2); font-family: 'JetBrains Mono', monospace; }
  .qi-label {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.4;
  }
  .qi-cwd {
    font-size: 11px;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 6px;
  }
  .qi-result {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.4;
    margin-bottom: 10px;
  }
  .qi-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .qi-dismiss {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
  }
  .qi-dismiss:hover { border-color: var(--text2); }
  .qi-open {
    background: var(--accent);
    color: var(--bg);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    text-decoration: none;
  }

  /* --- Empty state --- */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text2);
    text-align: center;
    padding: 20px;
    gap: 12px;
  }
  .empty-state .empty-icon { font-size: 40px; opacity: 0.3; }
  .empty-state p { font-size: 14px; max-width: 280px; line-height: 1.5; }
</style>
</head>
<body>

<div class="app" hx-ext="sse" sse-connect="/events">
  <!--
    SSE swap target: receives all server-sent events and processes OOB swaps.
    hx-swap="none" means the element itself isn't updated — only OOB elements
    in the response are swapped into their targets.

    Auto-scroll logic (hx-on:htmx:sse-message):
      Fires after every SSE message. Uses requestAnimationFrame so the DOM has
      settled before we measure scroll position.

      Two cases:
        1. Session replay (innerHTML swap on #messages): the browser resets
           scrollTop to 0. We detect this and scroll to the bottom so the user
           sees the end of the conversation.
        2. Streaming (beforeend swap appending new messages): scrollTop is
           preserved. We only auto-scroll if the user is already near the
           bottom (within 200px), so reading earlier messages isn't interrupted.
  -->
  <div sse-swap="htmx" hx-swap="none" style="display:none"
       hx-on:htmx:sse-message="requestAnimationFrame(()=>{
         var m=document.getElementById('messages');
         if(m.scrollTop===0||m.scrollHeight-m.scrollTop-m.clientHeight<200)
           m.scrollTop=m.scrollHeight
       })"></div>

  <div class="header">
    <button class="header-btn" popovertarget="drawer" hx-get="/drawer" hx-target="#drawer-content" hx-swap="innerHTML">☰</button>
    <div class="session-label" id="session-label" hx-get="/label-edit" hx-target="#session-label" hx-swap="outerHTML">no session</div>
    <span id="running-dot" style="display:none"></span>
    <button class="header-btn" popovertarget="new-session-popover">+</button>
  </div>

  <!-- Swap target for URL updates. When a session gets its ClaudeID, the
       server OOB-swaps this with a span that triggers an HTMX request to
       /session-url, which returns HX-Replace-Url to update the browser URL.
       See Broadcast() in hub.go for the full explanation. -->
  <span id="url-state"></span>
  <div class="mode-bar" id="mode-bar"></div>
  <div class="cost-bar" id="cost-bar"></div>

  <details class="todos-panel" id="todos-panel">
    <summary class="todos-summary" id="todos-summary"></summary>
    <div class="todos-body" id="todos-body"></div>
  </details>

  <div class="messages" id="messages">
    <div class="empty-state">
      <div class="empty-icon">⌘</div>
      <p>Start a new session to begin working with Claude Code on your project</p>
      <button class="btn-create" popovertarget="new-session-popover" style="padding:10px 24px">New Session</button>
    </div>
  </div>

  <div class="queue-bar" id="queue-bar"></div>
  <div class="input-area">
    <form hx-post="/send" hx-swap="none" hx-encoding="multipart/form-data" hx-on::after-request="this.reset(); this.querySelector('.badge').classList.add('hidden'); this.querySelector('.badge').textContent = ''">
      <div class="input-row">
        <textarea name="text" placeholder="Message Claude Code..." rows="1"></textarea>
        <label class="img-btn" title="Attach image">
          <span class="badge hidden"></span>
          📎
          <input type="file" name="images" accept="image/jpeg,image/png,image/gif,image/webp" multiple hidden onchange="this.previousElementSibling.textContent = this.files.length || ''; this.previousElementSibling.classList.toggle('hidden', !this.files.length)">
        </label>
        <button type="submit" class="send-btn">↑</button>
        <span id="stop-btn"></span>
      </div>
    </form>
  </div>
</div>

<!-- Drawer popover -->
<div popover id="drawer">
  <div id="drawer-content" style="padding:8px;text-align:center;color:var(--text2);font-size:13px">Loading...</div>
</div>

<!-- New session popover -->
<div popover id="new-session-popover">
  <h3>New Session</h3>
  <form hx-post="/new" hx-swap="none"
        hx-on::after-request="document.getElementById('new-session-popover').hidePopover()">
    <label>Label</label>
    <input type="text" name="label" placeholder="fix auth flaky test">
    <label>Project directory</label>
    <input type="text" name="cwd" placeholder="~/projects/my-app">
    <div class="modal-actions">
      <button type="button" class="btn-cancel" popovertarget="new-session-popover" popovertargetaction="hide">Cancel</button>
      <button type="submit" class="btn-create">Create</button>
    </div>
  </form>
</div>

</body>
</html>
